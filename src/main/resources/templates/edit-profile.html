<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 500px;">
    <div class="card p-4 shadow-sm" style="border-radius: 15px;">
        <h4 class="mb-4 fw-bold">Chỉnh sửa thông tin cá nhân</h4>
        <form action="/profile/edit" method="POST">
            <div class="mb-3">
                <label class="form-label">Họ và tên</label>
                <input type="text" class="form-control" name="fullName" value="Hương Ngọc">
            </div>
            <div class="mb-3">
                <label class="form-label">Tiểu sử</label>
                <textarea class="form-control" name="bio">Java Developer</textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill">Lưu thay đổi</button>
        </form>
    </div>
</div>
</body>
</html>
