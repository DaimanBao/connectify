<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Followers - Connectify</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fb;
    font-family:Arial,sans-serif;
}

/* NAVBAR */

.custom-navbar{
    background:white;
    padding:15px 0;
    box-shadow:0 2px 15px rgba(0,0,0,0.08);
}

.logo{
    text-decoration:none;
    font-size:30px;
    font-weight:bold;

    background:linear-gradient(90deg,#2563eb,#3b82f6);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.search-box input{
    width:300px;
    border:none;
    outline:none;
    background:#f1f5f9;
    padding:10px 18px;
    border-radius:25px;
}

.nav-icons{
    display:flex;
    align-items:center;
    gap:20px;
    font-size:22px;
}

.nav-avatar{
    width:42px;
    height:42px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#e5e7eb;

    font-size:22px;

    cursor:pointer;
}

/* MENU */

.menu-card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    position:sticky;
    top:100px;
}

.menu-item{
    display:block;
    text-decoration:none;
    color:#333;
    padding:12px 15px;
    border-radius:12px;
    margin-bottom:10px;
    font-weight:500;
}

.menu-item:hover{
    background:#eff6ff;
    color:#2563eb;
}

.active-menu{
    background:#2563eb;
    color:white !important;
}

/* FOLLOWERS */

.follow-card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.user-item{
    padding:18px;
    border-radius:15px;
    transition:0.3s;
    margin-bottom:15px;
}

.user-item:hover{
    background:#f8fbff;
    transform:translateY(-2px);
}

.avatar-ring{
    width:78px;
    height:78px;
    padding:3px;
    border-radius:50%;

    background:linear-gradient(
        135deg,
        #feda75 0%,
        #fa7e1e 25%,
        #d62976 50%,
        #962fbf 75%,
        #4f5bd5 100%
    );

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.avatar{
    width:72px;
    height:72px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:30px;
    font-weight:700;

    color:white;

    background:
        linear-gradient(
            45deg,
            #f58529,
            #feda77,
            #dd2a7b,
            #8134af,
            #515bd4
        );

    border:3px solid white;

    box-shadow:
        0 8px 20px rgba(0,0,0,0.12);

    flex-shrink:0;
}

.user-item{

    padding:20px;

    border-radius:18px;

    transition:all .3s ease;

    margin-bottom:15px;

    border:1px solid #eef2f7;
}

.user-item:hover{

    background:white;

    transform:translateY(-4px);

    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.user-name{

    font-size:18px;

    font-weight:700;

    color:#111827;
}

.user-email{

    color:#6b7280;

    font-size:14px;
}

/* PROFILE */

.profile-card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    position:sticky;
    top:100px;
}

.profile-avatar{

    width:120px;
    height:120px;

    margin:auto;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:48px;

    font-weight:700;

    color:white;

    background:
            linear-gradient(
                    135deg,
                    #f58529,
                    #dd2a7b,
                    #8134af,
                    #515bd4
            );

    box-shadow:
            0 8px 20px rgba(0,0,0,0.15);
}

.profile-stats{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.profile-stats h6{
    font-weight:bold;
}

</style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar custom-navbar">

    <div class="container">

        <a class="logo" href="/">
            🚀 Connectify
        </a>

        <div class="search-box">
            <input type="text" placeholder="Search users...">
        </div>

        <div class="nav-icons">

            <span>🔔</span>

            <div class="nav-avatar">
                 👤
            </div>

        </div>

</nav>

<div class="container mt-4">

    <div class="row">

        <!-- LEFT -->

        <div class="col-md-2">

            <div class="card menu-card">

                <div class="card-body">

                    <a href="/" class="menu-item">
                        🏠 Home
                    </a>

                    <a href="#" class="menu-item">
                        👥 Friends
                    </a>

                    <a href="#" class="menu-item">
                        💬 Messages
                    </a>

                    <a href="/followers/1"
                       class="menu-item active-menu">
                        👥 Followers
                    </a>

                    <a href="/following/1"
                       class="menu-item">
                        👁️ Following
                    </a>
                    
                    <a href="#" class="menu-item">
                        ❤️ Favorites
                    </a>
                    
                    <a href="#" class="menu-item">
                        ⚙️ Settings
                    </a>

                </div>

            </div>

        </div>

        <!-- CENTER -->

        <div class="col-md-7">

            <div class="card follow-card">

                <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div>

                            <h3 class="fw-bold">
                                👥 Followers
                            </h3>
                            <p class="text-muted mb-0">
                               Danh sách người đang theo dõi bạn
                            </p>

                            <small class="text-muted">
                                Total Followers:
                                <span th:text="${followersCount}"></span>
                            </small>

                        </div>

                    </div>

                    <div th:each="user : ${followers}"
                         class="user-item">

                        <div class="d-flex align-items-center">
                                 
                                 <div class="avatar-ring">
                                 
                                     <div class="avatar"
                                          th:text="${#strings.substring(user.username,0,1).toUpperCase()}">
                                     </div>
                                      
                                 </div>

                            <div class="ms-3 flex-grow-1">

                                <div class="user-name"
                                     th:text="${user.username}">
                                </div>

                                <div class="user-email"
                                     th:text="${user.email}">
                                </div>

                            </div>

                            <a th:href="@{/follow/1/{followingId}(followingId=${user.id})}"
                                class="btn btn-primary">
                                Follow Back
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT -->

<div class="col-md-3">

    <div class="card profile-card">

        <div class="card-body text-center">

            <!-- Avatar chữ C -->

            <div class="profile-avatar">
                C
            </div>

            <h5 class="mt-3">
                Connectify User
            </h5>

            <p class="text-muted">
                Social Network
            </p>

            <a href="#"
               class="btn btn-primary w-100 mb-3">
                Edit Profile
            </a>

            <hr>

            <div class="profile-stats">

                <div>
                    <h6>0</h6>
                    <small>Posts</small>
                </div>

                <div>
                    <h6 th:text="${followersCount}">
                        0
                    </h6>
                    <small>Followers</small>
                </div>

                <div>
                    <h6 th:text="${followingCount}">
                        0
                    </h6>
                    <small>Following</small>
                </div>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
