<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connectify</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f7fb;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */

        .custom-navbar{
            background:white;
            padding:15px 0;
            box-shadow:0 2px 15px rgba(0,0,0,0.08);
        }

        .logo{
            text-decoration:none;
            font-size:30px;
            font-weight:bold;

            background:linear-gradient(90deg,#2563eb,#3b82f6);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .search-box input{
            width:300px;
            border:none;
            outline:none;
            background:#f1f5f9;
            padding:10px 18px;
            border-radius:25px;
        }

        .nav-icons{
            display:flex;
            align-items:center;
            gap:20px;
            font-size:22px;
        }

        .nav-icons img{
            width:42px;
            height:42px;
            border-radius:50%;
            object-fit:cover;
        }

        /* STORY */

        .story-container{
            display:flex;
            gap:20px;
            overflow-x:auto;
            background:white;
            padding:20px;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .story{
            text-align:center;
        }

        .story img{
            width:70px;
            height:70px;
            border-radius:50%;
            border:3px solid #3b82f6;
            padding:3px;
            object-fit:cover;
        }

        .story p{
            margin-top:8px;
            margin-bottom:0;
            font-size:14px;
        }

        /* CREATE POST */

        .create-post-card{
            border:none;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .create-post-input{
            width:100%;
            border:none;
            outline:none;
            background:#f1f5f9;
            padding:12px;
            border-radius:25px;
        }

        /* POST */

        .post-card{
            border:none;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
        }

        .post-avatar{
            width:50px;
            height:50px;
            border-radius:50%;
            object-fit:cover;
        }

        .post-image{
            border-radius:15px;
        }

        /* PROFILE */

        .profile-card{
            border:none;
            border-radius:18px;
            box-shadow:0 5px 20px rgba(0,0,0,0.08);
            position:sticky;
            top:100px;
        }

        .profile-avatar{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #3b82f6;
        }

        .profile-stats{
            display:flex;
            justify-content:space-around;
            margin-top:20px;
        }

        .profile-stats h6{
            margin-bottom:0;
            font-weight:bold;
        }
        /* LEFT MENU */

        .menu-card{

            border:none;

            border-radius:18px;

            box-shadow:0 5px 20px rgba(0,0,0,0.08);

            position:sticky;

            top:100px;
        }

        .menu-item{

            display:block;

            text-decoration:none;

            color:#333;

            padding:12px 15px;

            border-radius:12px;

            margin-bottom:10px;

            font-weight:500;

            transition:0.3s;
        }

        .menu-item:hover{

            background:#eff6ff;

            color:#2563eb;
        }

        .active-menu{

            background:#2563eb;

            color:white !important;
        }

    </style>

</head>
<body>

<!-- NAVBAR -->

<nav class="navbar custom-navbar">

    <div class="container">

        <a class="logo" href="#">
            🚀 Connectify
        </a>

        <div class="search-box">
            <input type="text" placeholder="Search users...">
        </div>

        <div class="nav-icons">

            <span>🔔</span>

            <img src="https://i.pravatar.cc/40?img=10">

        </div>

    </div>

</nav>

<!-- MAIN -->

<div class="container mt-4">

    <div class="row">

        <!-- LEFT SIDEBAR -->
        <div class="col-md-2">

            <div class="card menu-card">

                <div class="card-body">

                    <a href="/" class="menu-item active-menu">
                        🏠 Home
                    </a>

                    <a href="#" class="menu-item">
                        👥 Friends
                    </a>

                    <a href="#" class="menu-item">
                        💬 Messages
                    </a>
                    
                    <a href="/followers/1" class="menu-item">
                        👤 Followers
                    </a>

                    <a href="/following/1" class="menu-item">
                        ❤️ Following
                    </a>

                    <a href="#" class="menu-item">
                        ⚙️ Settings
                    </a>

                </div>

            </div>

        </div>

        <!-- FEED -->
        <div class="col-md-7">

            <!-- STORY -->

            <div class="story-container mb-4">

                <div class="story">
                    <img src="https://i.pravatar.cc/80?img=1">
                    <p>Linh</p>
                </div>

                <div class="story">
                    <img src="https://i.pravatar.cc/80?img=2">
                    <p>Nam</p>
                </div>

                <div class="story">
                    <img src="https://i.pravatar.cc/80?img=3">
                    <p>An</p>
                </div>

                <div class="story">
                    <img src="https://i.pravatar.cc/80?img=4">
                    <p>Minh</p>
                </div>

            </div>

            <!-- CREATE POST -->

            <div class="card create-post-card mb-4">

                <div class="card-body">

                    <div class="d-flex align-items-center">

                        <img src="https://i.pravatar.cc/50?img=10"
                             class="post-avatar">

                        <input
                                type="text"
                                class="create-post-input ms-3"
                                placeholder="What's on your mind?">

                    </div>

                </div>

            </div>

            <!-- POST 1 -->

            <div class="card post-card mb-4">

                <div class="card-body">

                    <div class="d-flex align-items-center mb-3">

                        <img src="https://i.pravatar.cc/50?img=5"
                             class="post-avatar">

                        <div class="ms-3">

                            <h6 class="mb-0">
                                Hương Ngọc
                            </h6>

                            <small class="text-muted">
                                2 giờ trước
                            </small>

                        </div>

                    </div>

                    <p>
                        Hôm nay trời đẹp 🌤
                    </p>

                    <img
                            src="https://picsum.photos/id/1015/600/400"
                            class="img-fluid post-image">

                    <hr>

                    <div class="d-flex justify-content-around">

                        <button class="btn btn-light">
                            ❤️ Like
                        </button>

                        <button class="btn btn-light">
                            💬 Comment
                        </button>

                        <button class="btn btn-light">
                            📤 Share
                        </button>

                    </div>

                </div>

            </div>

            <!-- POST 2 -->

            <div class="card post-card mb-4">

                <div class="card-body">

                    <div class="d-flex align-items-center mb-3">

                        <img src="https://i.pravatar.cc/50?img=11"
                             class="post-avatar">

                        <div class="ms-3">

                            <h6 class="mb-0">
                                Minh Anh
                            </h6>

                            <small class="text-muted">
                                5 giờ trước
                            </small>

                        </div>

                    </div>

                    <p>
                        Đi học Java Spring Boot thôi 🚀
                    </p>

                    <img
                            src="https://picsum.photos/id/1025/600/400"
                            class="img-fluid post-image">

                    <hr>

                    <div class="d-flex justify-content-around">

                        <button class="btn btn-light">
                            ❤️ Like
                        </button>

                        <button class="btn btn-light">
                            💬 Comment
                        </button>

                        <button class="btn btn-light">
                            📤 Share
                        </button>

                    </div>

                </div>

            </div>

        </div>

        <!-- SIDEBAR -->

        <div class="col-md-3">

            <div class="card profile-card">

                <div class="card-body text-center">

                    <img
                            src="https://i.pravatar.cc/120?img=15"
                            class="profile-avatar">

                    <h5 class="mt-3">
                        Hương Ngọc
                    </h5>

                    <p class="text-muted">
                        Java Developer ☕
                    </p>

                    <button class="btn btn-primary w-100">
                        Edit Profile
                    </button>

                    <hr>

                    <div class="profile-stats">

                        <div>
                            <h6>12</h6>
                            <small>Posts</small>
                        </div>

                        <div>
                            <h6>530</h6>
                            <small>Followers</small>
                        </div>

                        <div>
                            <h6>180</h6>
                            <small>Following</small>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
