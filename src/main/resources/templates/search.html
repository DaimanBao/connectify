<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Search User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#fafafa;
        }

        .search-card{

            background:white;

            border-radius:20px;

            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }

        .user-card{

            background:white;

            border-radius:15px;

            padding:20px;

            margin-bottom:20px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            box-shadow:0 3px 15px rgba(0,0,0,.08);

        }

        .avatar{

            width:60px;

            height:60px;

            border-radius:50%;
        }

    </style>

</head>
<body>

<div class="container mt-5">

    <div class="card search-card p-4">

        <h2 class="mb-4">
            🔍 Search User
        </h2>

        <form action="/search">

            <div class="input-group">

                <input type="text"
                       class="form-control"
                       name="keyword"
                       placeholder="Search username">

                <button class="btn btn-primary">

                    Search

                </button>

            </div>

        </form>

    </div>

    <div class="mt-4">

        <div class="user-card"
             th:each="user : ${users}">

            <div class="d-flex align-items-center">

                <img src="https://i.pravatar.cc/80"
                     class="avatar">

                <div class="ms-3">

                    <h5 th:text="${user.username}">
                        Username
                    </h5>

                    <small class="text-muted">

                        Connectify User

                    </small>

                </div>

            </div>

            <a class="btn btn-outline-primary">

                View Profile

            </a>

        </div>

    </div>

</div>

</body>
</html>
